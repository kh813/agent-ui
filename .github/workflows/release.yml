name: "publish"

on:
  push:
    tags:
      - "v*"

jobs:
  publish-tauri:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: "macos-latest"
            args: "--target aarch64-apple-darwin"
            zip_name: "agent-ui-mac.zip"
          - platform: "windows-latest"
            args: ""
            zip_name: "agent-ui-win.zip"

    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      - name: setup node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin' || '' }}

      - name: install frontend dependencies
        run: npm install

      - name: build tauri app
        run: npm run tauri build -- ${{ matrix.args }}

      - name: package macOS app to zip
        if: matrix.platform == 'macos-latest'
        run: |
          cd src-tauri/target/aarch64-apple-darwin/release/bundle/macos
          ditto -c -k --sequesterRsrc --keepParent agent-ui.app ${{ github.workspace }}/agent-ui-mac.zip

      - name: package Windows exe to zip
        if: matrix.platform == 'windows-latest'
        shell: pwsh
        run: |
          Compress-Archive -Path src-tauri/target/release/agent-ui.exe -DestinationPath agent-ui-win.zip

      - name: upload release asset
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ matrix.zip_name }}
          draft: false
          name: "agent-ui ${{ github.ref_name }}"
          tag_name: ${{ github.ref_name }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
